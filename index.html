<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="header-nav">
        <a href="contacto.html" class="btn-contact">
            <span>👤</span> Sobre el Autor / Contacto
        </a>
    </div>

    <div class="wrapper">
        <div class="container main-panel">
            <h1>📝 TaskMaster</h1>

            <div id="auth-section">
                <input type="email" id="email" placeholder="Correo electrónico">
                <input type="password" id="password" placeholder="Contraseña">
                <div class="buttons">
                    <button id="btn-login">Entrar</button>
                    <button id="btn-signup">Registrarse</button>
                </div>
            </div>

            <div id="todo-section" class="hidden">
                <div class="user-info">
                    <span id="user-email"></span>
                    <button id="btn-logout">Salir</button>
                </div>
                
                <div class="input-group">
                    <input type="text" id="todo-input" placeholder="¿Qué tienes pendiente hoy?">
                    
                    <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                        <select id="todo-priority" style="flex: 1; padding: 10px; border-radius: 10px; background: var(--input-bg); color: white; border: none;">
                            <option value="baja">🟢 Baja</option>
                            <option value="media">🟡 Media</option>
                            <option value="alta">🔴 Alta</option>
                        </select>
                        <input type="date" id="todo-date" style="flex: 1; margin-bottom: 0;">
                    </div>
                    
                    <button id="btn-add">Añadir Tarea</button>
                </div>
            </div>
        </div>

        <div id="list-panel" class="container task-panel hidden">
            <div class="filter-group">
                <button class="btn-filter active" onclick="setFilter('all')">Todas</button>
                <button class="btn-filter" onclick="setFilter('pending')">Pendientes</button>
                <button class="btn-filter" onclick="setFilter('completed')">Hechas</button>
            </div>

            <ul id="todo-list"></ul>
            <div id="empty-state" class="empty-state">
                <p>No hay pendientes. ¡Buen trabajo! ✨</p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
