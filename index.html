<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Gestor de Tareas Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <h1>📝 Mis Pendientes</h1>

        <div id="auth-section">
            <input type="email" id="email" placeholder="Correo electrónico">
            <input type="password" id="password" placeholder="Contraseña">
            <div class="buttons">
                <button id="btn-login">Entrar</button>
                <button id="btn-signup">Registrarse</button>
            </div>
        </div>

        <div id="todo-section" class="hidden">
            <div class="user-info">
                <span id="user-email"></span>
                <button id="btn-logout">Salir</button>
            </div>
            
            <div class="input-group">
                <input type="text" id="todo-input" placeholder="Nueva tarea...">
                <button id="btn-add">Añadir</button>
            </div>

            <ul id="todo-list">
                </ul>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
