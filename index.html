<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="wrapper">
        <div class="container main-panel">
            <h1>📝 TaskMaster</h1>

            <div id="auth-section">
                <input type="email" id="email" placeholder="Correo electrónico">
                <input type="password" id="password" placeholder="Contraseña">
                <div class="buttons">
                    <button id="btn-login">Entrar</button>
                    <button id="btn-signup">Registrarse</button>
                </div>
            </div>

            <div id="todo-section" class="hidden">
                <div class="user-info">
                    <span id="user-email"></span>
                    <button id="btn-logout">Salir</button>
                </div>
                <div class="input-group">
                    <input type="text" id="todo-input" placeholder="¿Qué sigue hoy?">
                    <button id="btn-add">Añadir</button>
                </div>
            </div>
        </div>

        <div id="list-panel" class="container task-panel hidden">
            <h3>Tu Lista</h3>
            <ul id="todo-list"></ul>
            <div id="empty-state" class="empty-state">
                <p>Todo en orden por aquí ✨</p>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
